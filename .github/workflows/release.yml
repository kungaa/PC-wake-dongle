name: Build release firmware

# Builds every board UF2 and attaches them to a release (see build-firmware.yml).
# Normally fires when a GitHub Release is published; also runnable manually for a
# given tag (the release: published event is not always reliable when the release
# is created via API/CLI).
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and attach UF2s to (e.g. v1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and upload release UF2
    uses: ./.github/workflows/build-firmware.yml
    with:
      ref: ${{ github.event.release.tag_name || inputs.tag }}
      version: ${{ github.event.release.tag_name || inputs.tag }}
      asset_suffix: -${{ github.event.release.tag_name || inputs.tag }}
      upload_tag: ${{ github.event.release.tag_name || inputs.tag }}
