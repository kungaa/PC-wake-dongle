name: Build release firmware

# Fires when a GitHub Release is published: builds every board UF2 and attaches
# them to that release (see build-firmware.yml).
on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build and upload release UF2
    uses: ./.github/workflows/build-firmware.yml
    with:
      ref: ${{ github.event.release.tag_name }}
      version: ${{ github.event.release.tag_name }}
      asset_suffix: -${{ github.event.release.tag_name }}
      upload_tag: ${{ github.event.release.tag_name }}
